name: Daily Portfolio Notification

on:
  schedule:
    # 毎日 (JST) 12:00 と 21:00 目安。GitHub の cron は UTC (JST = UTC+9)。
    # 注意: GitHub Actions のスケジュールは best-effort で、負荷時は数十分〜数時間遅れる/
    # まれに欠落する公式仕様。分を :00 から外す(:07)と世界的な混雑を避けやすく遅延を抑えられる。
    # 市場休場日(土日・祝日・年末年始)は SKIP_IF_MARKET_CLOSED により自動でスキップ。
    - cron: "7 3 * * *" #  12:07 JST 目安 毎日 (= 03:07 UTC)
    - cron: "7 12 * * *" # 21:07 JST 目安 毎日 (= 12:07 UTC)
  workflow_dispatch:
    inputs:
      symbols:
        description: "分析する銘柄コード(カンマ区切り。例: 7203,6758)。空欄なら保有銘柄すべて"
        required: false
        default: ""

permissions:
  contents: write # the workflow commits the judgment log back to the repo

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send notification
        env:
          # LINE(旧・情報通知)は一旦停止。今回のDiscord通知に情報が統合済みのため
          # トークンを渡さず、LINE送信をスキップさせる(コードは非破壊。再開時はこの行を戻すだけ)。
          # LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ANALYZE_SYMBOLS: ${{ inputs.symbols }}
          SKIP_IF_MARKET_CLOSED: ${{ github.event_name == 'schedule' && '1' || '' }}
          JUDGMENT_LOG: data/judgment_log.csv
          # [カテゴリ4] スコア安定性の監査ログ(前回サブスコアとの突き合わせ用)。
          SUBSCORE_LOG: data/subscore_log.csv
        run: python -m stock_analyzer.daily_notify

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in data/judgment_log.csv data/subscore_log.csv; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git commit -m "chore: 判断/監査ログ追記 ($(TZ=Asia/Tokyo date +%F))"
            git pull --rebase origin main
            git push
          fi

      - name: Alert on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ 株分析の実行に失敗しました。ログ: $RUN_URL\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
