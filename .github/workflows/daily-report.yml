name: Daily Portfolio Notification

on:
  schedule:
    # Weekdays (JST) at 13:00 and 21:00. GitHub cron is UTC (JST = UTC+9).
    - cron: "0 4 * * 1-5" #  13:00 JST Mon-Fri (= 04:00 UTC Mon-Fri)
    - cron: "0 12 * * 1-5" # 21:00 JST Mon-Fri (= 12:00 UTC Mon-Fri)
  workflow_dispatch:
    inputs:
      symbols:
        description: "分析する銘柄コード(カンマ区切り。例: 7203,6758)。空欄なら保有銘柄すべて"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ANALYZE_SYMBOLS: ${{ inputs.symbols }}
          SKIP_IF_MARKET_CLOSED: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python -m stock_analyzer.daily_notify

      - name: Alert on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ 株分析の実行に失敗しました。ログ: $RUN_URL\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
