name: Daily Portfolio Notification

on:
  schedule:
    # Weekdays (JST) at 13:00 and 21:00. GitHub cron is UTC (JST = UTC+9).
    - cron: "0 4 * * 1-5" #  13:00 JST Mon-Fri (= 04:00 UTC Mon-Fri)
    - cron: "0 12 * * 1-5" # 21:00 JST Mon-Fri (= 12:00 UTC Mon-Fri)
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send LINE notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -m stock_analyzer.daily_notify
