name: Daily Portfolio Notification

on:
  schedule:
    # Weekdays (JST) at 06:00, 10:00, and 12:00. GitHub cron is UTC (JST = UTC+9).
    - cron: "0 21 * * 0-4" # 06:00 JST Mon-Fri (= 21:00 UTC Sun-Thu)
    - cron: "0 1 * * 1-5" #  10:00 JST Mon-Fri (= 01:00 UTC Mon-Fri)
    - cron: "0 3 * * 1-5" #  12:00 JST Mon-Fri (= 03:00 UTC Mon-Fri)
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send LINE notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -m stock_analyzer.daily_notify
